services:

  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    network_mode: host
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}

  # マインクラフトサーバー 1
  server-1:
    image: itzg/minecraft-server
    container_name: mc-server-1
    environment:
      TYPE: PAPER
      EULA: "TRUE"
      MEMORY: 2G
      ONLINE_MODE: "false"
      VELOCITY_SECRET: "58380ae76933706d5cd72d67f6d5d6aa66522ae49e786d6457a5447c58b046b1"
    volumes:
      - ./server-1:/data
    networks:
      - mc-network

  # マインクラフトサーバー 2
  server-2:
    image: itzg/minecraft-server
    container_name: mc-server-2
    environment:
      TYPE: PAPER
      EULA: "TRUE"
      MEMORY: 2G
      ONLINE_MODE: "false"
      VELOCITY_SECRET: "58380ae76933706d5cd72d67f6d5d6aa66522ae49e786d6457a5447c58b046b1"
    volumes:
      - ./server-2:/data
    networks:
      - mc-network

networks:
  mc-network:
    driver: bridge